name: Deploy
on:
  workflow_run:
    workflows: ["Run Tests", "Python application"]
    types: [completed]
    branches: [master]

jobs:
  check-workflows:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      all-passed: ${{ steps.check.outputs.all_passed }}
    steps:
      - name: Check all required workflows passed
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const requiredWorkflows = ['Run Tests', 'Python application'];
            const sha = context.payload.workflow_run.head_sha;

            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: sha,
            });

            const allPassed = requiredWorkflows.every(name => {
              const run = data.workflow_runs.find(r => r.name === name && r.conclusion === 'success');
              if (!run) {
                core.info(`Workflow "${name}" not yet successful for SHA ${sha}`);
                return false;
              }
              core.info(`Workflow "${name}" passed for SHA ${sha}`);
              return true;
            });

            core.setOutput('all_passed', allPassed ? 'true' : 'false');

  push-image:
    needs: check-workflows
    if: needs.check-workflows.outputs.all-passed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mineguardian-backend:latest

  deploy:
    needs: push-image
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy
        run: |
          curl -s -X POST https://deploy.silentlab.work/webhook \
            -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}"
